<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI Hub - GPT-4 Chat</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
  <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Symbols+Rounded"/>
  <style>
    /* CSS - இதை <style> tag-ல add பண்ணு */

.typing-indicator {
  opacity: 1;
  transition: opacity 0.3s;
}

.typing-dots {
  display: flex;
  align-items: center;
  gap: 4px;
  padding: 8px 12px;
}

.typing-dots span {
  display: inline-block;
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: #6366f1;
  animation: typing-bounce 1.4s infinite ease-in-out;
}

.typing-dots span:nth-child(1) {
  animation-delay: 0s;
}

.typing-dots span:nth-child(2) {
  animation-delay: 0.2s;
}

.typing-dots span:nth-child(3) {
  animation-delay: 0.4s;
}

/* Bounce Animation */
@keyframes typing-bounce {
  0%, 60%, 100% {
    transform: translateY(0);
    opacity: 0.7;
  }
  30% {
    transform: translateY(-10px);
    opacity: 1;
  }
}
    :root {
      --bg: #0f0f23;
      --sidebar: #17171f;
      --chat-bg: #17171f;
      --text: #e2e8f0;
      --text-muted: #94a3b8;
      --primary: #6366f1;
      --border: rgba(255,255,255,0.1);
      --input-bg: rgba(255,255,255,0.05);
    }
    [data-theme="light"] {
      --bg: #f8fafc;
      --sidebar: #ffffff;
      --chat-bg: #ffffff;
      --text: #1e293b;
      --text-muted: #64748b;
      --primary: #6366f1;
      --border: rgba(0,0,0,0.1);
      --input-bg: rgba(0,0,0,0.05);
    }

    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      overflow: hidden;
    }

    .sidebar {
      width: 280px;
      background: var(--sidebar);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
    }
    .sidebar-header {
      padding: 20px;
      border-bottom: 1px solid var(--border);
    }
    .new-chat-btn {
      background: var(--primary);
      color: white;
      border: none;
      padding: 12px 16px;
      border-radius: 12px;
      cursor: pointer;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 10px;
      width: 100%;
      transition: all 0.3s;
    }
    .new-chat-btn:hover { opacity: 0.9; transform: translateY(-1px); }

    .chat-history {
      flex: 1;
      overflow-y: auto;
      padding: 10px;
    }
    .chat-item {
      padding: 12px 16px;
      border-radius: 10px;
      cursor: pointer;
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      gap: 12px;
      transition: all 0.2s;
    }
    .chat-item:hover { background: rgba(255,255,255,0.08); }
    .chat-item.active {
      background: rgba(99,102,241,0.2);
      border: 1px solid var(--primary);
    }
    .chat-item .delete-chat {
      opacity: 0;
      margin-left: auto;
      background: none;
      border: none;
      color: #ef4444;
      cursor: pointer;
    }
    .chat-item:hover .delete-chat { opacity: 1; }

    .main-chat {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: var(--chat-bg);
    }
    .chat-header {
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .header-title {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .status-dot {
      width: 8px;
      height: 8px;
      background: #10b981;
      border-radius: 50%;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    .theme-toggle {
      background: none;
      border: 1px solid var(--border);
      color: var(--text);
      width: 40px;
      height: 40px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .messages-container {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
    }
    .message {
      margin-bottom: 24px;
      display: flex;
      gap: 16px;
      animation: fadeIn 0.4s ease;
    }
    .message.user-message { flex-direction: row-reverse; }
    .message-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: var(--primary);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-size: 18px;
    }
    .message.user-message .message-avatar { background: #10b981; }
    .message-content { max-width: 80%; }
    .message-text {
      background: var(--input-bg);
      padding: 14px 18px;
      border-radius: 18px;
      border-top-left-radius: 4px;
      line-height: 1.7;
      white-space: pre-wrap;
    }
    .message.user-message .message-text {
      background: var(--primary);
      color: white;
      border-top-right-radius: 4px;
      border-top-left-radius: 18px;
    }
    .message-actions {
      margin-top: 8px;
      opacity: 0;
      transition: opacity 0.3s;
      display: flex;
      gap: 8px;
    }
    .message:hover .message-actions { opacity: 1; }
    .action-btn {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      padding: 6px 10px;
      border-radius: 6px;
      font-size: 12px;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .action-btn:hover { background: rgba(255,255,255,0.1); }

    .error-message .message-text {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.3);
      color: #fca5a5;
    }

    .chat-input-area {
      padding: 20px 24px;
      border-top: 1px solid var(--border);
      background: var(--chat-bg);
    }
    .input-wrapper {
      display: flex;
      gap: 12px;
      align-items: flex-end;
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 12px 16px;
    }
    .message-input {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      color: var(--text);
      font-size: 1rem;
      resize: none;
      max-height: 150px;
      font-family: inherit;
    }
    .send-btn {
      background: var(--primary);
      color: white;
      border: none;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s;
    }
    .send-btn:hover { transform: scale(1.05); }
    .send-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes bounce {
      0%,80%,100% { transform: scale(0.6); opacity: 0.5; }
      40% { transform: scale(1); opacity: 1; }
    }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }

    code {
      background: rgba(0,0,0,0.3);
      padding: 2px 6px;
      border-radius: 4px;
      font-family: 'Courier New', monospace;
    }
    pre {
      background: rgba(0,0,0,0.4);
      padding: 12px;
      border-radius: 8px;
      overflow-x: auto;
      margin: 10px 0;
    }
  </style>
</head>
<body data-theme="dark">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <button class="new-chat-btn" id="newChatBtn">
        <span class="material-symbols-rounded">add</span>
        New Chat
      </button>
    </div>
    <div class="chat-history" id="chatHistory"></div>
  </aside>

  <!-- Main Chat -->
  <main class="main-chat">
    <header class="chat-header">
      <div class="header-title">
        <h2>🤖 GPT-4 Assistant</h2>
        <div class="status-dot"></div>
        <span style="font-size:12px; color:var(--text-muted);">Online</span>
      </div>
      <button class="theme-toggle" id="themeToggle">
        <span class="material-symbols-rounded">light_mode</span>
      </button>
    </header>

    <div class="messages-container" id="messagesContainer">
      <div class="message bot-message">
        <div class="message-avatar">🤖</div>
        <div class="message-content">
          <div class="message-text">வணக்கம்! 👋 நான் GPT-4 AI Assistant. உங்களுக்கு எப்படி உதவ வேண்டும்?</div>
        </div>
      </div>
    </div>

    <div class="chat-input-area">
      <div class="input-wrapper">
        <textarea class="message-input" placeholder="Type your message..." name="prompt" id="messageInput" rows="1"></textarea>
        <button class="send-btn" id="sendBtn">
          <span class="material-symbols-rounded">send</span>
        </button>
      </div>
    </div>
  </main>

<script>
  // =============================================
  // 🔧 CONFIGURATION - உங்க Backend URL இங்கே
  // =============================================
  const API_URL = window.location.href;  // உங்க backend URL
  
  // =============================================

  const themeToggle = document.getElementById('themeToggle');
  const body = document.body;
  const messageInput = document.getElementById('messageInput');
  const sendBtn = document.getElementById('sendBtn');
  const messagesContainer = document.getElementById('messagesContainer');
  const chatHistory = document.getElementById('chatHistory');
  const newChatBtn = document.getElementById('newChatBtn');

  let currentChatId = Date.now();
  let chats = {};

  // Load theme
  if (localStorage.getItem('theme') === 'light') {
    body.setAttribute('data-theme', 'light');
    themeToggle.innerHTML = '<span class="material-symbols-rounded">dark_mode</span>';
  }

  // Theme toggle
  themeToggle.addEventListener('click', () => {
    const isLight = body.getAttribute('data-theme') === 'light';
    body.setAttribute('data-theme', isLight ? 'dark' : 'light');
    themeToggle.innerHTML = `<span class="material-symbols-rounded">${isLight ? 'light_mode' : 'dark_mode'}</span>`;
    localStorage.setItem('theme', isLight ? 'dark' : 'light');
  });

  // New chat
  function createNewChat() {
    currentChatId = Date.now();
    messagesContainer.innerHTML = `
      <div class="message bot-message">
        <div class="message-avatar">🤖</div>
        <div class="message-content">
          <div class="message-text">How do i Help For a New chat! 👋 </div>
        </div>
      </div>
    `;
    updateChatHistory();
  }
  newChatBtn.addEventListener('click', createNewChat);

  // Update sidebar
  function updateChatHistory() {
    chatHistory.innerHTML = '';
    Object.keys(chats).reverse().forEach(id => {
      const chat = chats[id];
      const item = document.createElement('div');
      item.className = 'chat-item' + (id == currentChatId ? ' active' : '');
      item.innerHTML = `
        <span class="material-symbols-rounded">chat_bubble</span>
        <span style="flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">${chat.title}</span>
        <button class="delete-chat" onclick="event.stopPropagation(); deleteChat('${id}')">
          <span class="material-symbols-rounded">delete</span>
        </button>
      `;
      item.onclick = () => {
        currentChatId = id;
        messagesContainer.innerHTML = chat.messages;
        updateChatHistory();
      };
      chatHistory.appendChild(item);
    });
  }

  window.deleteChat = function(id) {
    delete chats[id];
    if (id == currentChatId) createNewChat();
    else updateChatHistory();
  }

  // =============================================
  // 🚀 AJAX - BACKEND API CALL
  // =============================================
  async function callBackendAPI(userMessage) {
    
    const response = await fetch(API_URL, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',

      },
      body: JSON.stringify({
        prompt: userMessage
        // நீங்க வேற parameters அனுப்பணும்னா இங்கே add பண்ணுங்க:
        // user_id: "123",
        // session_id: currentChatId
      })
    });

    if (!response.ok) {
      throw new Error(`Server Error: ${response.status}`);
    }

    const data = await response.json();
    
    // ✅ "reply" variable-ல response வரும்
    return data.reply;
  }

  // =============================================
  // 📨 SEND MESSAGE
  // =============================================
  async function sendMessage() {
    const text = messageInput.value.trim();
    if (!text) return;

    // Disable input
    messageInput.disabled = true;
    sendBtn.disabled = true;

    // Add user message
    messagesContainer.insertAdjacentHTML('beforeend', `
      <div class="message user-message">
        <div class="message-avatar">👤</div>
        <div class="message-content">
          <div class="message-text">${escapeHtml(text)}</div>
        </div>
      </div>
    `);
    messageInput.value = '';
    messageInput.style.height = 'auto';

    // Add typing indicator
    const typingId = 'typing-' + Date.now();
    messagesContainer.insertAdjacentHTML('beforeend', `
<div class="message bot-message typing-indicator" id="${typingId}">
  <div class="message-avatar">🤖</div>
  <div class="message-content">
    <div class="message-text">
      <div class="typing-dots">
        <span></span>
        <span></span>
        <span></span>
      </div>
    </div>
  </div>
</div>
    `);
    scrollToBottom();

    try {
      // 🚀 Call Backend API
      const reply = await callBackendAPI(text);
      
      // Remove typing
      document.getElementById(typingId)?.remove();
      
      // Add bot response
      messagesContainer.insertAdjacentHTML('beforeend', `
        <div class="message bot-message">
          <div class="message-avatar">🤖</div>
          <div class="message-content">
            <div class="message-text">${formatResponse(reply)}</div>
            <div class="message-actions">
              <button class="action-btn" onclick="copyText(this)">
                <span class="material-symbols-rounded" style="font-size:16px;">content_copy</span> Copy
              </button>
            </div>
          </div>
        </div>
      `);

    } catch (error) {
      console.error('API Error:', error);
      document.getElementById(typingId)?.remove();
      
      messagesContainer.insertAdjacentHTML('beforeend', `
        <div class="message bot-message error-message">
          <div class="message-avatar">⚠️</div>
          <div class="message-content">
            <div class="message-text">
              ❌ Error: ${escapeHtml(error.message)}<br><br>
              Backend server running-ஆ check பண்ணுங்க!
            </div>
          </div>
        </div>
      `);
    }

    // Re-enable input
    messageInput.disabled = false;
    sendBtn.disabled = false;
    messageInput.focus();
    scrollToBottom();

    // Save chat
    chats[currentChatId] = {
      title: text.substring(0, 25) + (text.length > 25 ? '...' : ''),
      messages: messagesContainer.innerHTML
    };
    updateChatHistory();
  }

  // Helper functions
  function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
  }

  function formatResponse(text) {
    if (!text) return '';
    return escapeHtml(text)
      .replace(/\n/g, '<br>')
      .replace(/```([\s\S]*?)```/g, '<pre><code>$1</code></pre>')
      .replace(/`([^`]+)`/g, '<code>$1</code>')
      .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
      .replace(/\*(.*?)\*/g, '<em>$1</em>');
  }

  function scrollToBottom() {
    messagesContainer.scrollTop = messagesContainer.scrollHeight;
  }

  window.copyText = function(btn) {
    const text = btn.closest('.message-content').querySelector('.message-text').innerText;
    navigator.clipboard.writeText(text);
    btn.innerHTML = '<span class="material-symbols-rounded" style="font-size:16px;">check</span> Copied!';
    setTimeout(() => {
      btn.innerHTML = '<span class="material-symbols-rounded" style="font-size:16px;">content_copy</span> Copy';
    }, 2000);
  }

  // Events
  sendBtn.addEventListener('click', sendMessage);
  messageInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  messageInput.addEventListener('input', function() {
    this.style.height = 'auto';
    this.style.height = Math.min(this.scrollHeight, 150) + 'px';
  });

  // Init
  chats[currentChatId] = { title: 'New Chat', messages: messagesContainer.innerHTML };
  updateChatHistory();
</script>

</body>
</html>
