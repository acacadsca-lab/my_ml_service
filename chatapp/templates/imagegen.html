<!DOCTYPE html>
{% load static %}
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text to Image Generator</title>
    <link rel="stylesheet" href="{% static 'css/txt2img.css' %}">
  
</head>
<style>
       * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0f0f0f 0%, #1a1a2e 100%);
            color: #e0e0e0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            width: 100%;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 2.5rem;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        .form-card {
            background: rgba(26, 26, 46, 0.8);
            border: 1px solid rgba(102, 126, 234, 0.2);
            border-radius: 15px;
            padding: 40px;
            margin-bottom: 30px;
            transition: all 0.3s ease;
        }

        .form-card:hover {
            box-shadow: 0 0 30px rgba(102, 126, 234, 0.4),
                        0 0 60px rgba(118, 75, 162, 0.2);
            border-color: rgba(102, 126, 234, 0.5);
            transform: translateY(-5px);
        }

        .form-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            margin-bottom: 10px;
            font-weight: 600;
            color: #667eea;
        }

        input[type="text"],
        textarea {
            width: 100%;
            padding: 12px 15px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(102, 126, 234, 0.3);
            border-radius: 8px;
            color: #e0e0e0;
            font-family: inherit;
            transition: all 0.3s ease;
        }

        input[type="text"]:focus,
        textarea:focus {
            outline: none;
            background: rgba(255, 255, 255, 0.1);
            border-color: #667eea;
            box-shadow: 0 0 15px rgba(102, 126, 234, 0.3);
        }

        textarea {
            resize: vertical;
            min-height: 100px;
        }

        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        button:hover {
            box-shadow: 0 0 20px rgba(102, 126, 234, 0.6);
            transform: translateY(-2px);
        }

        button:active {
            transform: translateY(0);
        }

        .spinner {
            display: none;
            border: 3px solid rgba(102, 126, 234, 0.2);
            border-top-color: #667eea;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 0.8s linear infinite;
            margin: 10px auto;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .image-card {
            background: rgba(26, 26, 46, 0.8);
            border: 1px solid rgba(102, 126, 234, 0.2);
            border-radius: 15px;
            overflow: hidden;
            transition: all 0.3s ease;
            display: none;
        }

        .image-card:hover {
            box-shadow: 0 0 30px rgba(102, 126, 234, 0.4),
                        0 0 60px rgba(118, 75, 162, 0.2);
            border-color: rgba(102, 126, 234, 0.5);
            transform: translateY(-5px);
        }

        .image-card.active {
            display: block;
        }

        .image-container {
            width: 100%;
            height: 400px;
            background: rgba(0, 0, 0, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .image-container img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .image-info {
            padding: 20px;
            border-top: 1px solid rgba(102, 126, 234, 0.2);
        }

        .image-info p {
            margin: 8px 0;
            font-size: 0.95rem;
        }

        .error {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.5);
            color: #fca5a5;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }

        .error.show {
            display: block;
        }
</style>
<body>
    <div class="container">
        <div class="header">
            <h1>✨ Text to Image Generator</h1>
            <p>Transform your words into stunning visuals</p>
        </div>

        <div class="error" id="error"></div>

        <div class="form-card">
            <form id="genForm" method="post" enctype="multipart/form-data">
                {% csrf_token %}
                
                <div class="form-group">
                    <label for="prompt">Prompt</label>
                    <textarea id="prompt" name="prompt" placeholder="Describe the image you want to generate..." required></textarea>
                </div>

                <button type="submit">Generate Image</button>
                <div class="spinner" id="spinner"></div>
            </form>
        </div>

        <div class="image-card" id="imageCard">
            <div class="image-container">
                <img id="generatedImage" src="" alt="Generated Image">
            </div>
            <div class="image-info">
                <p><strong>Prompt:</strong> <span id="promptText"></span></p>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('genForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const prompt = document.getElementById('prompt').value;
            const spinner = document.getElementById('spinner');
            const error = document.getElementById('error');
            spinner.style.display = 'block';
            error.classList.remove('show');
            try {
                const response = await fetch('{% url "ai_image_gen" %}', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRFToken': document.querySelector('[name=csrfmiddlewaretoken]').value,
                    },
                    body: JSON.stringify({ prompt }),
                });
                const data = await response.json();
                if (data.image_url) {
                    document.getElementById('generatedImage').src =
                        "data:image/png;base64," + data.image_url;
                        console.log("data:image/png;base64," + data.image_url);
                    document.getElementById('imageCard').classList.add('active');
                }
               else {
                    showError(data.message || 'Failed to generate image');
                }
            } catch (err) {
                showError('Error: ' + err.message);
            } finally {
                spinner.style.display = 'none';
            }
        });
        function showError(message) {
            const error = document.getElementById('error');
            error.textContent = message;
            error.classList.add('show');
        }
    </script>
</body>
</html>
