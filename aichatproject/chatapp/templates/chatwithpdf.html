<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat with PDF</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 30px;
            color: white;
            text-align: center;
        }
        
        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        
        .upload-section {
            padding: 30px;
            border-bottom: 2px solid #f0f0f0;
        }
        
        .file-input-wrapper {
            position: relative;
            display: inline-block;
            cursor: pointer;
            width: 100%;
        }
        
        .file-input-wrapper input[type=file] {
            position: absolute;
            opacity: 0;
            width: 100%;
            height: 100%;
            cursor: pointer;
        }
        
        .file-input-label {
            display: block;
            padding: 20px;
            background: #f8f9fa;
            border: 3px dashed #667eea;
            border-radius: 12px;
            text-align: center;
            transition: all 0.3s;
        }
        
        .file-input-label:hover {
            background: #e9ecef;
            border-color: #764ba2;
        }
        
        .upload-btn {
            margin-top: 15px;
            padding: 12px 30px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.3s;
        }
        
        .upload-btn:hover {
            background: #764ba2;
        }
        
        .chat-section {
            padding: 30px;
            min-height: 400px;
            max-height: 500px;
            overflow-y: auto;
        }
        
        .message {
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
        }
        
        .message.user {
            justify-content: flex-end;
        }
        
        .message-bubble {
            max-width: 70%;
            padding: 15px 20px;
            border-radius: 18px;
            word-wrap: break-word;
        }
        
        .message.user .message-bubble {
            background: #667eea;
            color: white;
            border-bottom-right-radius: 4px;
        }
        
        .message.bot .message-bubble {
            background: #f1f3f5;
            color: #333;
            border-bottom-left-radius: 4px;
        }
        
        .input-section {
            padding: 20px 30px;
            background: #f8f9fa;
            display: flex;
            gap: 10px;
        }
        
        .input-section input {
            flex: 1;
            padding: 15px 20px;
            border: 2px solid #e9ecef;
            border-radius: 25px;
            font-size: 16px;
            outline: none;
            transition: border 0.3s;
        }
        
        .input-section input:focus {
            border-color: #667eea;
        }
        
        .send-btn {
            padding: 15px 30px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 25px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.3s;
        }
        
        .send-btn:hover {
            background: #764ba2;
        }
        
        .loading {
            text-align: center;
            padding: 20px;
            color: #667eea;
        }
        
        .status {
            padding: 10px 20px;
            margin: 10px 0;
            border-radius: 8px;
            text-align: center;
        }
        
        .status.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        
        .status.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📄 Chat with PDF</h1>
            <p>Upload your PDF and ask questions!</p>
        </div>
        
        <div class="upload-section">
            <div class="file-input-wrapper">
                <input type="file" id="pdfFile" accept=".pdf">
                <label class="file-input-label" for="pdfFile">
                    <span id="fileName">📎 Click to select PDF or drag & drop</span>
                </label>
            </div>
            <button class="upload-btn" onclick="uploadPDF()">📤 Upload & Process</button>
            <div id="uploadStatus"></div>
        </div>
        
        <div class="chat-section" id="chatSection">
            <p style="text-align:center; color:#adb5bd;">Upload a PDF to start chatting...</p>
        </div>
        
        <div class="input-section">
            <input 
                type="text" 
                id="questionInput" 
                placeholder="Ask a question about your PDF..." 
                disabled
                onkeypress="if(event.key==='Enter') askQuestion()"
            >
            <button class="send-btn" onclick="askQuestion()" disabled id="sendBtn">Send</button>
        </div>
    </div>

    <script>
        let currentDocId = null;
        
        // File selection feedback
        document.getElementById('pdfFile').addEventListener('change', function(e) {
            const fileName = e.target.files[0]?.name || 'Click to select PDF';
            document.getElementById('fileName').textContent = '📎 ' + fileName;
        });
        
        // Upload PDF
        async function uploadPDF() {
            const fileInput = document.getElementById('pdfFile');
            const file = fileInput.files[0];
            
            if (!file) {
                showStatus('Please select a PDF file', 'error');
                return;
            }
            
            const formData = new FormData();
            formData.append('pdf', file);
            formData.append('title', file.name);
            
            showStatus('⏳ Processing PDF...', 'success');
            
            try {
                const response = await fetch('/api/upload/', {
                    method: 'POST',
                    body: formData
                });
                
                const data = await response.json();
                
                if (data.success) {
                    currentDocId = data.document_id;
                    showStatus('✅ PDF processed! You can now ask questions.', 'success');
                    
                    // Enable chat
                    document.getElementById('questionInput').disabled = false;
                    document.getElementById('sendBtn').disabled = false;
                    
                    // Clear chat
                    document.getElementById('chatSection').innerHTML = '';
                } else {
                    showStatus('❌ Error: ' + data.error, 'error');
                }
            } catch (error) {
                showStatus('❌ Upload failed: ' + error, 'error');
            }
        }
        
        // Ask question
        async function askQuestion() {
            const input = document.getElementById('questionInput');
            const question = input.value.trim();
            
            if (!question || !currentDocId) return;
            
            // Add user message
            addMessage(question, 'user');
            input.value = '';
            
            // Show loading
            const loadingId = addMessage('Thinking...', 'bot', true);
            
            try {
                const response = await fetch('/api/chat/', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        document_id: currentDocId,
                        question: question
                    })
                });
                
                const data = await response.json();
                
                // Remove loading
                document.getElementById(loadingId).remove();
                
                if (data.success) {
                    addMessage(data.answer, 'bot');
                } else {
                    addMessage('Error: ' + data.error, 'bot');
                }
            } catch (error) {
                document.getElementById(loadingId).remove();
                addMessage('Failed to get answer: ' + error, 'bot');
            }
        }
        
        // Add message to chat
        function addMessage(text, sender, isLoading = false) {
            const chatSection = document.getElementById('chatSection');
            const messageId = 'msg-' + Date.now();
            
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${sender}`;
            messageDiv.id = messageId;
            
            const bubble = document.createElement('div');
            bubble.className = 'message-bubble';
            bubble.textContent = text;
            
            if (isLoading) {
                bubble.innerHTML = '<div class="loading">💭 Thinking...</div>';
            }
            
            messageDiv.appendChild(bubble);
            chatSection.appendChild(messageDiv);
            
            // Scroll to bottom
            chatSection.scrollTop = chatSection.scrollHeight;
            
            return messageId;
        }
        
        // Show status message
        function showStatus(message, type) {
            const statusDiv = document.getElementById('uploadStatus');
            statusDiv.innerHTML = `<div class="status ${type}">${message}</div>`;
            
            if (type === 'success') {
                setTimeout(() => {
                    statusDiv.innerHTML = '';
                }, 5000);
            }
        }
    </script>
</body>
</html>
